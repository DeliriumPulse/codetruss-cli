name: Bug report
description: Report a reproducible CodeTruss CLI problem without private code or credentials.
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include private source, diffs, receipts, credentials, keys, or customer data.
  - type: input
    id: version
    attributes:
      label: CodeTruss version
      placeholder: codetruss 0.2.0
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Operating system, Node version, and Git version.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Safe minimal reproduction
      description: Use synthetic files and redact local paths or identifiers.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed private code, diffs, receipts, credentials, keys, and customer data.
          required: true
