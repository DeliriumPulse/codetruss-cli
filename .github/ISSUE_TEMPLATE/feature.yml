name: Feature proposal
description: Propose a focused improvement to the local CLI or receipt workflow.
title: "proposal: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should CodeTruss solve?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: Describe the behavior and how success could be verified.
    validations:
      required: true
  - type: textarea
    id: privacy
    attributes:
      label: Privacy or security constraints
      description: Note any local-first, credential, evidence, or command-execution implications.
