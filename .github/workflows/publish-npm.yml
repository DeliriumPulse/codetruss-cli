name: Publish npm

run-name: Publish ${{ inputs.tag }} to npm

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing attested GitHub release tag, for example v0.2.1
        required: true
        type: string
      confirm_publish:
        description: Publish the verified release archive to npm
        required: true
        default: false
        type: boolean

permissions: {}

concurrency:
  group: npm-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish verified GitHub release
    if: ${{ inputs.confirm_publish }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: npm
    permissions:
      contents: read
      id-token: write
    env:
      RELEASE_TAG: ${{ inputs.tag }}
    steps:
      - name: Check out the selected tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag }}
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
          package-manager-cache: false
      - name: Activate pinned release tools
        run: |
          corepack enable
          corepack prepare pnpm@10.28.2 --activate
          npm install --global npm@12.0.1
          npm --version
      - name: Require an exact release tag
        run: |
          node - <<'NODE'
          const pkg = require('./packages/cli/package.json')
          const expected = `v${pkg.version}`
          if (process.env.RELEASE_TAG !== expected) {
            throw new Error(`requested tag ${process.env.RELEASE_TAG} does not match ${expected}`)
          }
          NODE
      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile
      - name: Download the existing GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir release
          gh release download "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --dir release
      - name: Verify exact release bytes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pnpm build
          pnpm release:verify
          pnpm test:install
          VERSION="$(node -p "require('./packages/cli/package.json').version")"
          gh attestation verify "release/codetruss-cli-${VERSION}.tgz" --repo "$GITHUB_REPOSITORY"
      - name: Publish with npm trusted publishing
        run: |
          VERSION="$(node -p "require('./packages/cli/package.json').version")"
          npm publish "release/codetruss-cli-${VERSION}.tgz" --access public --provenance
